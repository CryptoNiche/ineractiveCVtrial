<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Interactive CV</title>
  <style>
    /* Fullscreen canvas background */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      color: white;
      background: #1e1e2f;
      overflow: hidden;
    }

    #tsparticles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1; /* behind content */
    }

    .cv-content {
      position: relative;
      padding: 50px;
      max-width: 800px;
      margin: auto;
      background: rgba(0,0,0,0.5); /* semi-transparent overlay */
      border-radius: 10px;
    }

    h1, h2, p {
      margin: 0 0 15px 0;
    }
  </style>
</head>
<body>

<!-- Particles background -->
<div id="tsparticles"></div>

<div class="cv-content">
  <h1>Your Name</h1>
  <h2>Frontend Developer</h2>
  <p>Email: youremail@example.com</p>
  <p>Phone: +123456789</p>

  <h2>Skills</h2>
  <p>HTML, CSS, JavaScript, React, WebGL</p>

  <h2>Experience</h2>
  <p>Worked on interactive web apps and particle-based UI designs.</p>

  <h2>Education</h2>
  <p>Bachelor’s in Computer Science</p>
</div>

<!-- tsParticles library -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.1/tsparticles.bundle.min.js"></script>
<script>
  tsParticles.load("tsparticles", {
    fpsLimit: 60,
    particles: {
      number: {
        value: 80,
        density: { enable: true, area: 800 }
      },
      color: { value: "#ffffff" },
      shape: { type: "circle" },
      opacity: { value: 0.5 },
      size: { value: { min: 1, max: 5 } },
      move: {
        enable: true,
        speed: 2,
        direction: "none",
        outModes: { default: "bounce" }
      },
      links: {
        enable: true,
        distance: 120,
        color: "#ffffff",
        opacity: 0.3,
        width: 1
      }
    },
    interactivity: {
      detectsOn: "canvas",
      events: {
        onHover: { enable: true, mode: "repulse" },
        onClick: { enable: true, mode: "push" },
      },
      modes: {
        repulse: { distance: 100 },
        push: { quantity: 4 }
      }
    },
    detectRetina: true,
    background: { color: "#1e1e2f" }
  });
</script>

</body>
</html>
